<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patisserie Plain</title>
    <link rel="stylesheet" href="./css/style.css" class="" />
    <link rel="icon" type="img/png" href="./img/iconicon.png">
  </head>
  <body>
    <header>
      <nav class="navbar">
        <div class="container">
          <div class="logo">
            <a href="./index.html">Patisserie Plain</a>
          </div>

          <ul class="nav-links">
            <li><a href="./index.html">Home</a></li>
            <li><a href="./about.html">About</a></li>
            <li><a href="./menu.html">Menu</a></li>
            <li><a href="./contact.html" class="active">Contact</a></li>
          </ul>
        </div>
      </nav>
    </header>
    <main>
      <section class="contact">
        <div class="container">
          <h1>Contact Us</h1>
          <div class="contact-details">
            <p>
              <strong>Adress: </strong>Brgy Tiguma, Pagadian City, Philippines
            </p>
            <p><strong>Phone: </strong>(+63) 912-345-6789</p>
            <p><strong>Email: </strong> info@patisserieplain.com</p>
          </div>
          <form action="#" method="post" class="contact-form">
            <label for="name">Name: </label>
            <input
              type="text"
              name="name"
              id="name"
              placeholder="Enter Your Name"
            />

            <br />
            <label for="name">Email: </label>
            <input
              type="email"
              name="email"
              id="email"
              placeholder="Enter Your Email"
            />

            <br />
            <label for="message">Message: </label>
            <textarea
              name="message"
              id="message"
              placeholder="Enter Your Message..."
            ></textarea>

            <br />
            <button type="submit">Send Message</button>
          </form>
        </div>
      </section>
    </main>
    <footer>
      <div class="container">
        <p>&copy; Patisserie Plain. Alrights Reserved 2026</p>
      </div>
    </footer>
  </body>
</html>
